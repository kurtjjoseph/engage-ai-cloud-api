<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password · Engage AI</title>
<style>
  :root{--bg:#0c1116;--panel:#131a22;--panel2:#0f151b;--line:#232e3a;--ink:#e6edf3;--ink-soft:#8b98a5;--accent:#2dd4bf;--accent-ink:#04211d;--bad:#f85149;--good:#3fb950;}
  @media (prefers-color-scheme:light){:root{--bg:#f2f5f7;--panel:#fff;--panel2:#f7f9fa;--line:#dbe2e8;--ink:#131b22;--ink-soft:#556370;--accent:#0d9488;--accent-ink:#fff;--bad:#cf222e;--good:#1a7f37;}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px}
  h1{margin:0 0 4px;font-size:20px}
  p.lead{margin:0 0 20px;color:var(--ink-soft);font-size:13px}
  label{display:block;font-size:12px;color:var(--ink-soft);margin:12px 0 5px}
  input{width:100%;padding:10px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font:inherit}
  input:focus{outline:2px solid var(--accent);outline-offset:0}
  .btn{margin-top:18px;width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:8px;padding:11px 16px;font-weight:600;font-size:14px;cursor:pointer}
  .msg{margin-top:12px;font-size:12.5px;min-height:16px}
  .msg.err{color:var(--bad)} .msg.ok{color:var(--good)}
  a{color:var(--accent)}
</style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p class="lead">Choose a new password for your Engage AI account.</p>
    <form id="f">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" minlength="8" required>
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" minlength="8" required>
      <button class="btn" type="submit" id="submit">Set new password</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
<script>
(function(){
  var token=new URLSearchParams(location.search).get("token");
  var msg=document.getElementById("msg");
  if(!token){ msg.className="msg err"; msg.textContent="This reset link is missing its token. Request a new one from the sign-in page."; document.getElementById("submit").disabled=true; return; }
  document.getElementById("f").addEventListener("submit",function(e){
    e.preventDefault();
    msg.className="msg"; msg.textContent="";
    var pw=document.getElementById("pw").value, pw2=document.getElementById("pw2").value;
    if(pw.length<8){ msg.className="msg err"; msg.textContent="Password must be at least 8 characters."; return; }
    if(pw!==pw2){ msg.className="msg err"; msg.textContent="The two passwords don't match."; return; }
    var btn=document.getElementById("submit"); btn.disabled=true;
    fetch("/auth/password-reset/confirm",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:token,new_password:pw})})
      .then(function(r){ if(!r.ok) return r.json().then(function(d){ throw new Error(d.detail||"Reset failed."); }); return r.json(); })
      .then(function(){ msg.className="msg ok"; msg.innerHTML='Password updated. <a href="/dashboard">Go to sign in →</a>'; })
      .catch(function(err){ btn.disabled=false; msg.className="msg err"; msg.textContent=err.message; });
  });
})();
</script>
</body>
</html>
