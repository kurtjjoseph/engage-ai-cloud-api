<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOM · Engage AI Control</title>
<style>
  :root{
    --bg:#0c1116; --panel:#131a22; --panel2:#0f151b; --line:#232e3a; --ink:#e6edf3; --ink-soft:#8b98a5; --dim:#5b6875;
    --accent:#2dd4bf; --accent-ink:#04211d; --accent-soft:#0f2c29;
    --good:#3fb950; --warn:#d29922; --bad:#f85149;
    --good-soft:#0f2a17; --warn-soft:#2a2109; --bad-soft:#2d1315;
  }
  @media (prefers-color-scheme:light){:root{
    --bg:#f2f5f7; --panel:#ffffff; --panel2:#f7f9fa; --line:#dbe2e8; --ink:#131b22; --ink-soft:#556370; --dim:#8493a0;
    --accent:#0d9488; --accent-ink:#ffffff; --accent-soft:#d7f0ec;
    --good:#1a7f37; --warn:#9a6700; --bad:#cf222e; --good-soft:#e3f2e6; --warn-soft:#f6efd6; --bad-soft:#fbe6e6;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  button{font:inherit;cursor:pointer}
  .hide{display:none!important}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px}
  #login .card{width:100%;max-width:360px;padding:28px}
  #login h1{margin:0 0 4px;font-size:20px}
  #login p{margin:0 0 20px;color:var(--ink-soft);font-size:13px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px}
  input{width:100%;padding:10px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font:inherit}
  input:focus{outline:2px solid var(--accent);outline-offset:0}
  .btn{background:var(--accent);color:var(--accent-ink);border:none;border-radius:8px;padding:10px 16px;font-weight:600;width:100%}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);width:auto;padding:7px 13px;font-weight:500}
  .err{color:var(--bad);font-size:12.5px;margin-top:10px;min-height:16px}

  /* shell */
  header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:12px 20px}
  .brand{font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .live{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
  .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){.live .pulse{animation:none}}
  .spacer{flex:1}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 70px}

  /* stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .tile .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .tile .v{font-size:27px;font-weight:700;margin-top:4px;line-height:1}
  .tile .d{font-size:11.5px;color:var(--dim);margin-top:4px}

  h2.sec{font-size:14px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px;font-weight:600}
  .grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
  @media (max-width:900px){.grid{grid-template-columns:1fr}}

  /* table */
  .tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 13px;border-bottom:1px solid var(--line)}
  th{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;background:var(--panel2)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel2)}
  .site-name{font-weight:600;color:var(--ink);cursor:pointer}
  .site-name:hover{color:var(--accent)}
  .sub{font-size:11.5px;color:var(--dim)}
  .score-pill{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-variant-numeric:tabular-nums}
  .dotc{width:9px;height:9px;border-radius:50%;flex:none}
  .delta{font-size:12px;font-weight:600}
  .delta.up{color:var(--good)} .delta.down{color:var(--bad)} .delta.flat{color:var(--dim)}
  .chip{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .chip.ok{background:var(--good-soft);color:var(--good)} .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)} .chip.dim{background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
  .lnk{font-size:12px;margin-right:9px;white-space:nowrap}

  /* logs */
  .logs{background:var(--panel);border:1px solid var(--line);border-radius:11px;max-height:520px;overflow:auto}
  .log{display:flex;gap:10px;padding:9px 13px;border-bottom:1px solid var(--line);font-size:12.5px}
  .log:last-child{border-bottom:none}
  .log .icn{flex:none;width:8px;height:8px;border-radius:50%;margin-top:5px}
  .log .icn.scan{background:var(--accent)} .log .icn.agent{background:var(--warn)}
  .log .body{flex:1;min-width:0}
  .log .body .m{color:var(--ink)} .log .body .meta{color:var(--dim);font-size:11px;margin-top:1px}

  /* detail */
  .backrow{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .detail-head{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px}
  .detail-head h1{margin:0;font-size:24px}
  .detail-head .meta{color:var(--ink-soft);font-size:13px;margin-top:4px}
  .bigscore{display:flex;align-items:baseline;gap:12px;margin-top:10px}
  .bigscore .n{font-size:52px;font-weight:800;line-height:1}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px 18px;margin-bottom:16px}
  .panel h3{margin:0 0 12px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media (max-width:820px){.two{grid-template-columns:1fr}}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
  .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
  .kpi .c{font-size:12px;color:var(--ink-soft);text-transform:capitalize;display:flex;justify-content:space-between;gap:6px;align-items:center}
  .kpi .s{font-size:22px;font-weight:700;margin-top:3px}
  .kpi .cls{font-size:10.5px;color:var(--dim);margin-top:2px}
  .kpi .badge{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:999px}
  svg{display:block;max-width:100%}
  .empty{color:var(--dim);font-size:13px;padding:8px 0}
  .runlist{list-style:none;margin:0;padding:0;font-size:12.5px}
  .runlist li{padding:8px 0;border-bottom:1px solid var(--line)}
  .runlist li:last-child{border-bottom:none}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);
    color:var(--ink);padding:9px 16px;border-radius:999px;font-size:12.5px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  /* scan details */
  .kv{width:100%;border-collapse:collapse;font-size:12.5px}
  .kv td{padding:5px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  .kv td.k{color:var(--ink-soft);width:160px;white-space:nowrap}
  .kv td.v{color:var(--ink);font-family:ui-monospace,Menlo,monospace;word-break:break-word}
  .scanlist li{display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;padding:10px 4px}
  .scanlist li:hover{background:var(--panel2)}
  .chan-detail{border:1px solid var(--line);border-radius:9px;margin-bottom:10px;overflow:hidden}
  .chan-detail summary{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;list-style:none}
  .chan-detail summary::-webkit-details-marker{display:none}
  .chan-detail .cbody{padding:2px 14px 14px}
  .chan-detail h4{margin:12px 0 4px;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
  .bd{width:100%;border-collapse:collapse;font-size:12px}
  .bd th,.bd td{padding:4px 8px;border-bottom:1px solid var(--line);text-align:left}
  .bd th{color:var(--ink-soft);font-weight:600}
  .bd td.p{text-align:right;font-family:ui-monospace,Menlo,monospace;font-weight:600}
  .srcs{font-size:11.5px;margin-top:9px;word-break:break-all;color:var(--ink-soft)}
  .srcs a{margin-right:9px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h1>Engage AI Control</h1>
    <p>Vision Outreach Media · operator sign-in</p>
    <form id="loginForm">
      <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="username" required></div>
      <div class="field"><label for="pw">Password</label><input id="pw" type="password" autocomplete="current-password" required></div>
      <button class="btn" type="submit">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <header class="top">
    <span class="brand"><span class="dot"></span>Engage AI Control</span>
    <span class="live"><span class="pulse"></span><span id="liveLabel">live</span></span>
    <span class="spacer"></span>
    <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
    <button class="btn ghost" id="logoutBtn" type="button">Sign out</button>
  </header>
  <div class="wrap">
    <div id="main"></div>
    <div id="detail" class="hide"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var TOKEN_KEY="engageai_admin_token";
  var token=localStorage.getItem(TOKEN_KEY)||null;
  var pollTimer=null, agoTimer=null, lastFetch=null, currentView={name:"main"};

  var $=function(s,r){return (r||document).querySelector(s);};
  function el(id){return document.getElementById(id);}
  function toast(m){var t=el("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  function api(path,opts){
    opts=opts||{};
    var headers=opts.headers||{};
    if(token) headers["Authorization"]="Bearer "+token;
    return fetch(path,Object.assign({},opts,{headers:headers})).then(function(r){
      if(r.status===401){ logout(); throw new Error("Session expired - sign in again."); }
      if(!r.ok) return r.text().then(function(t){ throw new Error(t||("HTTP "+r.status)); });
      return r.json();
    });
  }

  /* ---------- auth ---------- */
  el("loginForm").addEventListener("submit",function(e){
    e.preventDefault();
    el("loginErr").textContent="";
    fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:el("email").value,password:el("pw").value})})
      .then(function(r){ if(!r.ok) throw new Error("Invalid email or password."); return r.json(); })
      .then(function(d){ token=d.access_token; localStorage.setItem(TOKEN_KEY,token); showApp(); })
      .catch(function(err){ el("loginErr").textContent=err.message; });
  });
  function logout(){ token=null; localStorage.removeItem(TOKEN_KEY); stopPolling(); el("app").classList.add("hide"); el("login").classList.remove("hide"); }
  el("logoutBtn").addEventListener("click",logout);
  el("refreshBtn").addEventListener("click",function(){ route(true); });

  function showApp(){ el("login").classList.add("hide"); el("app").classList.remove("hide"); route(true); }

  /* ---------- helpers ---------- */
  function scoreColor(s){ if(s==null) return "var(--dim)"; if(s>=70) return "var(--good)"; if(s>=40) return "var(--warn)"; return "var(--bad)"; }
  function fmtDur(s){ return s==null?"—":(s>=60?(Math.round(s/6)/10)+"m":Math.round(s)+"s"); }
  function ago(iso){ if(!iso) return "never"; var d=(Date.now()-new Date(iso).getTime())/1000;
    if(d<60) return Math.max(0,Math.round(d))+"s ago"; if(d<3600) return Math.round(d/60)+"m ago";
    if(d<86400) return Math.round(d/3600)+"h ago"; return Math.round(d/86400)+"d ago"; }
  function deltaHtml(d){ if(d==null) return '<span class="delta flat">—</span>';
    var cls=d>0?"up":d<0?"down":"flat", sign=d>0?"▲ +":d<0?"▼ ":"± "; return '<span class="delta '+cls+'">'+sign+Math.abs(d)+'</span>'; }

  /* ---------- routing ---------- */
  window.addEventListener("hashchange",function(){ route(false); });
  function route(force){
    if(!token) return;
    var sm=(location.hash||"").match(/^#\/site\/(\d+)\/scan\/(\d+)/);
    var m=(location.hash||"").match(/^#\/site\/(\d+)/);
    if(sm){ currentView={name:"scan",id:+sm[1],sid:+sm[2]}; loadScan(+sm[1],+sm[2]); }
    else if(m){ currentView={name:"site",id:+m[1]}; loadDetail(+m[1]); }
    else { currentView={name:"main"}; loadMain(); }
  }
  function kvRows(obj){
    var keys=Object.keys(obj||{});
    if(!keys.length) return '<tr><td class="sub" colspan="2">— none —</td></tr>';
    return keys.map(function(k){
      var v=obj[k], h;
      if(v==null||v==="") h='<span class="sub">—</span>';
      else if(typeof v==="object") h=esc(JSON.stringify(v));
      else h=esc(v);
      return '<tr><td class="k">'+esc(k)+'</td><td class="v">'+h+'</td></tr>';
    }).join("");
  }

  /* ---------- polling ---------- */
  function stopPolling(){ if(pollTimer) clearInterval(pollTimer); if(agoTimer) clearInterval(agoTimer); pollTimer=agoTimer=null; }
  function startPolling(fn,ms){ stopPolling(); pollTimer=setInterval(fn,ms);
    agoTimer=setInterval(function(){ if(lastFetch) el("liveLabel").textContent="live · updated "+ago(lastFetch); },1000); }

  /* ================= MAIN ================= */
  function loadMain(){
    el("detail").classList.add("hide"); el("main").classList.remove("hide");
    var render=function(){ api("/admin/overview").then(function(d){ lastFetch=new Date().toISOString(); renderMain(d); })
      .catch(function(e){ toast(e.message); }); };
    render(); startPolling(function(){ if(currentView.name==="main") render(); },15000);
  }

  function renderMain(d){
    var t=d.totals;
    var tiles=[
      ["Sites tracked", t.total_sites, t.analytics_sites+" with analytics"],
      ["Avg org score", t.avg_org_score==null?"—":t.avg_org_score, "across scored sites"],
      ["Score improvement", (t.total_score_improvement>0?"+":"")+t.total_score_improvement, "vs baselines"],
      ["Installs this week", t.installs_this_week, "new sites (7d)"],
      ["Avg measure time", fmtDur(t.avg_measurement_seconds), "per scan"],
      ["Active agents", t.total_agents, "across all sites"],
      ["Needs review", t.sites_needing_review, "sites flagged"]
    ].map(function(x){ return '<div class="tile"><div class="k">'+x[0]+'</div><div class="v">'+esc(x[1])+'</div><div class="d">'+esc(x[2])+'</div></div>'; }).join("");

    var rows=d.sites.map(function(s){
      var links=(s.front_url?'<a class="lnk" href="'+esc(s.front_url)+'" target="_blank" rel="noopener">site ↗</a>':'')
              +(s.wp_admin_url?'<a class="lnk" href="'+esc(s.wp_admin_url)+'" target="_blank" rel="noopener">wp-admin ↗</a>':'');
      var status=!s.analytics_enabled?'<span class="chip dim">no analytics</span>'
                :s.org_score==null?'<span class="chip dim">no scan yet</span>'
                :s.needs_review?'<span class="chip warn">review</span>':'<span class="chip ok">healthy</span>';
      var score=s.org_score==null?'<span class="sub">—</span>'
        :'<span class="score-pill"><span class="dotc" style="background:'+scoreColor(s.org_score)+'"></span>'+s.org_score+'</span> '+deltaHtml(s.score_delta);
      return '<tr>'
        +'<td><span class="site-name" data-id="'+s.id+'">'+esc(s.name)+'</span><div class="sub">'+esc(s.org_type||"")+(s.website_url?' · '+esc(s.website_url.replace(/^https?:\/\//,"")):"")+'</div></td>'
        +'<td>'+score+'</td>'
        +'<td class="mono">'+(s.analytics_enabled?s.channel_count_scored+"/8":"—")+'</td>'
        +'<td class="mono">'+s.agent_count+'</td>'
        +'<td>'+status+'</td>'
        +'<td class="sub">'+ago(s.last_scan_at)+(s.last_scan_duration_seconds!=null?' · '+fmtDur(s.last_scan_duration_seconds):"")+'</td>'
        +'<td>'+(links||'<span class="sub">—</span>')+'</td>'
        +'</tr>';
    }).join("") || '<tr><td colspan="7" class="empty">No sites yet.</td></tr>';

    var logs=d.logs.map(function(l){
      return '<div class="log"><span class="icn '+l.kind+'"></span><div class="body"><div class="m">'+esc(l.detail)
        +(l.needs_review?' <span class="chip warn">review</span>':"")+'</div><div class="meta">'+esc(l.org_name||("org "+l.org_id))+' · '+ago(l.ts)+'</div></div></div>';
    }).join("") || '<div class="empty" style="padding:14px">No activity yet.</div>';

    el("main").innerHTML=
      '<div class="tiles">'+tiles+'</div>'
      +'<div class="grid">'
        +'<div><h2 class="sec">Sites</h2><div class="tbl-wrap"><table>'
          +'<thead><tr><th>Site</th><th>Score</th><th>Channels</th><th>Agents</th><th>Status</th><th>Last scan</th><th>Links</th></tr></thead>'
          +'<tbody>'+rows+'</tbody></table></div></div>'
        +'<div><h2 class="sec">Activity</h2><div class="logs">'+logs+'</div></div>'
      +'</div>';

    Array.prototype.forEach.call(el("main").querySelectorAll(".site-name"),function(n){
      n.addEventListener("click",function(){ location.hash="#/site/"+n.getAttribute("data-id"); });
    });
    if(lastFetch) el("liveLabel").textContent="live · updated just now";
  }

  /* ================= DETAIL ================= */
  function loadDetail(id){
    el("main").classList.add("hide"); el("detail").classList.remove("hide");
    var render=function(){ api("/admin/site/"+id).then(function(d){ lastFetch=new Date().toISOString(); renderDetail(d); })
      .catch(function(e){ toast(e.message); }); };
    render(); startPolling(function(){ if(currentView.name==="site"&&currentView.id===id) render(); },20000);
  }

  function radarSVG(ranking){
    var order=["website","google_business","youtube","facebook","instagram","linkedin","twitter_x","news_mentions"];
    var labels={website:"Web",google_business:"GBP",youtube:"YouTube",facebook:"FB",instagram:"IG",linkedin:"LinkedIn",twitter_x:"X",news_mentions:"News"};
    var byc={}; (ranking||[]).forEach(function(r){ byc[r.channel]=r.score; });
    var cx=150,cy=140,R=104,n=order.length,pts=[],axis="",lab="";
    for(var i=0;i<n;i++){
      var a=-Math.PI/2 + i*2*Math.PI/n, sc=(byc[order[i]]||0)/100;
      var x=cx+Math.cos(a)*R*sc, y=cy+Math.sin(a)*R*sc;
      pts.push(x.toFixed(1)+","+y.toFixed(1));
      var ex=cx+Math.cos(a)*R, ey=cy+Math.sin(a)*R;
      axis+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ex.toFixed(1)+'" y2="'+ey.toFixed(1)+'" stroke="var(--line)"/>';
      var lx=cx+Math.cos(a)*(R+16), ly=cy+Math.sin(a)*(R+16);
      lab+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" fill="var(--ink-soft)" font-size="10" text-anchor="middle" dominant-baseline="middle">'+labels[order[i]]+'</text>';
    }
    var rings="";[0.25,0.5,0.75,1].forEach(function(f){
      var rp=[];for(var i=0;i<n;i++){var a=-Math.PI/2+i*2*Math.PI/n;rp.push((cx+Math.cos(a)*R*f).toFixed(1)+","+(cy+Math.sin(a)*R*f).toFixed(1));}
      rings+='<polygon points="'+rp.join(" ")+'" fill="none" stroke="var(--line)" stroke-dasharray="2 3"/>';
    });
    return '<svg viewBox="0 0 300 285" width="300" height="285" role="img" aria-label="channel radar">'
      +rings+axis
      +'<polygon points="'+pts.join(" ")+'" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="2"/>'
      +lab+'</svg>';
  }

  function lineSVG(history){
    var pts=history.filter(function(h){return h.org_score!=null;});
    if(pts.length<2) return '<div class="empty">Need at least two scans to show a trend.</div>';
    var W=560,H=170,pad=28,maxI=pts.length-1;
    var x=function(i){return pad+i*(W-2*pad)/maxI;}, y=function(v){return H-pad-(v/100)*(H-2*pad);};
    var line=pts.map(function(h,i){return (i?"L":"M")+x(i).toFixed(1)+" "+y(h.org_score).toFixed(1);}).join(" ");
    var area="M"+x(0).toFixed(1)+" "+(H-pad)+" "+pts.map(function(h,i){return "L"+x(i).toFixed(1)+" "+y(h.org_score).toFixed(1);}).join(" ")+" L"+x(maxI).toFixed(1)+" "+(H-pad)+" Z";
    var grid="";[0,25,50,75,100].forEach(function(v){grid+='<line x1="'+pad+'" y1="'+y(v).toFixed(1)+'" x2="'+(W-pad)+'" y2="'+y(v).toFixed(1)+'" stroke="var(--line)"/><text x="4" y="'+(y(v)+3).toFixed(1)+'" fill="var(--dim)" font-size="9">'+v+'</text>';});
    var dots=pts.map(function(h,i){return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(h.org_score).toFixed(1)+'" r="'+(i===maxI?4:2.5)+'" fill="'+(i===maxI?"var(--accent)":"var(--ink-soft)")+'"><title>'+h.org_score+' · '+new Date(h.created_at).toLocaleDateString()+'</title></circle>';}).join("");
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" role="img" aria-label="score history">'
      +grid+'<path d="'+area+'" fill="var(--accent)" fill-opacity="0.10"/><path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2"/>'+dots+'</svg>';
  }

  function renderDetail(d){
    var ins=d.insights;
    var head=
      '<div class="backrow"><button class="btn ghost" id="backBtn" type="button">← All sites</button>'
        +(d.front_url?'<a class="btn ghost" href="'+esc(d.front_url)+'" target="_blank" rel="noopener">Open site ↗</a>':'')
        +(d.wp_admin_url?'<a class="btn ghost" href="'+esc(d.wp_admin_url)+'" target="_blank" rel="noopener">wp-admin ↗</a>':'')
      +'</div>'
      +'<div class="detail-head"><div><h1>'+esc(d.name)+'</h1>'
        +'<div class="meta">'+esc(d.org_type||"")+(d.website_url?' · '+esc(d.website_url):"")
          +' · installed '+ago(d.created_at)+' · '+d.agent_count+' agent'+(d.agent_count===1?"":"s")
          +(d.agent_niches.length?' ('+d.agent_niches.map(esc).join(", ")+')':"")+' · '+d.publication_count+' publications</div>';
    if(ins){
      head+='<div class="bigscore"><span class="n" style="color:'+scoreColor(ins.org_score)+'">'+(ins.org_score==null?"—":ins.org_score)+'</span>'
        +deltaHtml(ins.org_score!=null&&ins.baseline_org_score!=null?ins.org_score-ins.baseline_org_score:null)
        +(ins.needs_review?' <span class="chip warn">needs review</span>':' <span class="chip ok">ok</span>')
        +'<span class="sub" style="margin-left:6px">baseline '+(ins.baseline_org_score==null?"—":ins.baseline_org_score)+' · updated '+ago(ins.latest_created_at)+'</span></div>';
    } else {
      head+='<div class="bigscore"><span class="sub">Analytics not enabled for this site.</span></div>';
    }
    head+='</div></div>';

    var body="";
    if(ins){
      var kpis=(ins.ranking||[]).map(function(r){
        var badge=r.stale?'<span class="badge" style="background:var(--warn-soft);color:var(--warn)">stale</span>'
                 :r.needs_review?'<span class="badge" style="background:var(--warn-soft);color:var(--warn)">review</span>':"";
        return '<div class="kpi"><div class="c"><span>'+esc(r.channel.replace(/_/g," "))+'</span>'+badge+'</div>'
          +'<div class="s" style="color:'+scoreColor(r.score)+'">'+r.score+'</div>'
          +'<div class="cls">'+esc(r.classification)+(r.stale&&r.last_measured_at?' · as of '+new Date(r.last_measured_at).toLocaleDateString():"")+'</div></div>';
      }).join("");
      body=
        '<div class="two">'
          +'<div class="panel"><h3>Channel radar</h3>'+radarSVG(ins.ranking)+'</div>'
          +'<div class="panel"><h3>Score history</h3>'+lineSVG(d.history)+'</div>'
        +'</div>'
        +'<div class="panel"><h3>Channels ('+(d.history.length)+' scans)</h3><div class="kpis">'+kpis+'</div>'
          +(ins.summary?'<p class="sub" style="margin:14px 0 0">'+esc(ins.summary)+'</p>':"")+'</div>';
    }
    var scanRows=(d.scans||[]).map(function(s){
      var st=s.status==="complete"?'<span class="chip ok">complete</span>':s.status==="pending"?'<span class="chip dim">running…</span>':'<span class="chip bad">'+esc(s.status)+'</span>';
      return '<li class="scan-row" data-sid="'+s.id+'"><div><strong>'+ago(s.created_at)+'</strong> '+st
        +(s.needs_review?' <span class="chip warn">review</span>':"")+(s.is_baseline?' <span class="chip dim">baseline</span>':"")
        +'<div class="sub">'+esc(s.scope)+' · score '+(s.org_score==null?"—":s.org_score)+(s.duration_seconds!=null?' · '+fmtDur(s.duration_seconds):"")+' · '+s.channel_count+' channels</div></div>'
        +'<span class="lnk">details ›</span></li>';
    }).join("") || '<div class="empty">No scans yet.</div>';
    body+='<div class="panel"><h3>Scan attempts</h3><ul class="runlist scanlist">'+scanRows+'</ul></div>';

    var runs=(d.agent_runs||[]).map(function(r){
      return '<li><strong>'+esc(r.niche)+'</strong> · '+ago(r.ran_at)+(r.tickets_created?' · '+r.tickets_created+' tickets':"")
        +(r.summary?'<div class="sub">'+esc(r.summary)+'</div>':"")+'</li>';
    }).join("") || '<div class="empty">No agent activity yet.</div>';
    body+='<div class="panel"><h3>Agent activity</h3><ul class="runlist">'+runs+'</ul></div>';

    el("detail").innerHTML=head+body;
    el("backBtn").addEventListener("click",function(){ location.hash="#/"; });
    Array.prototype.forEach.call(el("detail").querySelectorAll(".scan-row"),function(r){
      r.addEventListener("click",function(){ location.hash="#/site/"+d.id+"/scan/"+r.getAttribute("data-sid"); });
    });
  }

  /* ================= SCAN DETAILS ================= */
  function loadScan(id,sid){
    el("main").classList.add("hide"); el("detail").classList.remove("hide");
    stopPolling();
    api("/organizations/"+id+"/analytics/snapshot/"+sid).then(function(s){ lastFetch=new Date().toISOString(); renderScan(id,s); })
      .catch(function(e){ toast(e.message); });
  }

  function renderScan(id,s){
    var rc=s.request_context||{}, oc=rc.org_context||{};
    var statusChip=s.status==="complete"?'<span class="chip ok">complete</span>'
      :s.status==="pending"?'<span class="chip dim">running…</span>':'<span class="chip bad">'+esc(s.status||"?")+'</span>';
    var head='<div class="backrow"><button class="btn ghost" id="backScan" type="button">← Back to site</button></div>'
      +'<div class="detail-head"><div><h1>Scan #'+s.id+'</h1><div class="meta">'+new Date(s.created_at).toLocaleString()+' · '+statusChip
        +(s.is_baseline?' <span class="chip dim">baseline</span>':"")+(s.needs_review?' <span class="chip warn">needs review</span>':"")
        +' · '+(s.duration_seconds!=null?fmtDur(s.duration_seconds):"—")+' · org score '+(s.org_score==null?"—":s.org_score)+'</div>'
        +(s.summary?'<p class="sub" style="margin-top:8px">'+esc(s.summary)+'</p>':"")+'</div></div>';

    var reqPanel='<div class="panel"><h3>Data used in the request</h3>'
      +'<h4 style="margin:0 0 4px;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase">Organization context sent to the model</h4>'
      +'<table class="kv"><tbody>'+kvRows(oc)+'</tbody></table>'
      +'<h4 style="margin:14px 0 4px;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase">Request parameters</h4>'
      +'<table class="kv"><tbody>'
        +'<tr><td class="k">model</td><td class="v">'+esc(rc.model||"—")+'</td></tr>'
        +'<tr><td class="k">channels requested</td><td class="v">'+esc(rc.requested_channels?rc.requested_channels.join(", "):"full sweep (all 8)")+'</td></tr>'
        +'<tr><td class="k">channels resolved</td><td class="v">'+esc((rc.resolved_channels||[]).join(", ")||"—")+'</td></tr>'
        +'<tr><td class="k">tool</td><td class="v">'+esc(rc.tool||"—")+'</td></tr>'
        +'<tr><td class="k">mode</td><td class="v">'+esc(rc.mode||"—")+'</td></tr>'
        +'<tr><td class="k">include pages</td><td class="v">'+(rc.include_pages?"yes":"no")+'</td></tr>'
      +'</tbody></table></div>';

    var chans=(s.channels||[]).map(function(c){
      var flags=(c.stale?'<span class="chip warn">stale · held</span> ':"")+(c.needs_review&&!c.stale?'<span class="chip warn">review</span> ':"");
      var bd=(c.score_breakdown||[]).map(function(b){
        var basis=b.basis==null?"—":(typeof b.basis==="object"?JSON.stringify(b.basis):String(b.basis));
        return '<tr><td>'+esc(b.rule)+'</td><td>'+esc(basis)+'</td><td class="p">+'+b.points+'</td></tr>';
      }).join("");
      var srcs=(c.sources||[]).map(function(u){return '<a href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u.replace(/^https?:\/\//,"").slice(0,44))+'</a>';}).join("");
      return '<details class="chan-detail"><summary><span><strong>'+esc(c.channel.replace(/_/g," "))+'</strong> '+flags
        +'</span><span class="score-pill"><span class="dotc" style="background:'+scoreColor(c.score)+'"></span>'+c.score+'</span></summary>'
        +'<div class="cbody">'
          +(c.review_reason?'<p class="sub" style="margin:10px 0 0;color:var(--warn)">⚑ '+esc(c.review_reason)+'</p>':"")
          +(c.stale&&c.last_measured_at?'<p class="sub" style="margin:8px 0 0">last really measured: '+new Date(c.last_measured_at).toLocaleDateString()+'</p>':"")
          +'<h4>Raw KPIs returned by the model</h4><table class="kv"><tbody>'+kvRows(c.kpis||{})+'</tbody></table>'
          +'<h4>Score breakdown (rule → basis → points)</h4><table class="bd"><thead><tr><th>Rule</th><th>Basis</th><th class="p">Points</th></tr></thead>'
            +'<tbody>'+(bd||'<tr><td colspan="3" class="sub">—</td></tr>')+'</tbody></table>'
          +(c.notes?'<h4>Notes</h4><p class="sub" style="margin:0">'+esc(c.notes)+'</p>':"")
          +(srcs?'<div class="srcs">sources: '+srcs+'</div>':"")
        +'</div></details>';
    }).join("") || '<div class="empty">No channel data yet'+(s.status==="pending"?" — scan still running.":".")+'</div>';

    var srcPanel="";
    if(s.sources&&s.sources.length){
      srcPanel='<div class="panel"><h3>All sources ('+s.sources.length+')</h3><div class="srcs">'
        +s.sources.map(function(u){return '<a href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u)+'</a>';}).join("")+'</div></div>';
    }

    el("detail").innerHTML=head+reqPanel+'<div class="panel"><h3>Per-channel data &amp; scoring</h3>'+chans+'</div>'+srcPanel;
    el("backScan").addEventListener("click",function(){ location.hash="#/site/"+id; });
    if(s.status==="pending"){ setTimeout(function(){ if(currentView.name==="scan"&&currentView.sid===s.id) loadScan(id,s.id); },3000); }
  }

  /* ---------- boot ---------- */
  if(token) showApp();
})();
</script>
</body>
</html>
