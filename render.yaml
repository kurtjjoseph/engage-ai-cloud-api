services:
  - type: web
    name: engage-ai-api
    runtime: docker
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: engage-ai-db
          property: connectionString

databases:
  - name: engage-ai-db
    plan: starter
